<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Custom New Tab</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>Custom New Tab</h1>
    <p class="lead">Choose the web page to show in every new tab.</p>

    <form id="form">
      <label for="url">Page address</label>
      <input id="url" type="url" inputmode="url" autocomplete="off"
             placeholder="https://example.com" required>
      <p class="hint">Tip: an <code>https://</code> page displays correctly inside the frame.
        An <code>http://</code> page may be blocked by Firefox — in that case, the new tab
        offers a link to open it directly.</p>
      <button type="submit">Save</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>
  <script src="options.js"></script>
</body>
</html>
